{% load static %}
{% include 'Admin/adminheader.html' %}

<div class="content-wrapper">
	<div class="container-xxl flex-grow-1 container-p-y">
		<div class="card">
			<div class="card-body">
				<div class="d-flex justify-content-between align-items-center mb-4">
					<h5 class="card-title mb-0">Admin Profile</h5>
					<a href="{% url 'admin_changepassword' %}" class="btn btn-primary">Change Password</a>
					<a href="{% url 'admin_logout' %}" class="btn btn-primary">Logout</a>
					<a href="{% url 'editadminprofilepage' %}" class="btn btn-primary">Edit Profile</a>
				</div>
				<div class="row g-4 align-items-start">
					<div class="col-md-3 text-center">
						<img src="{% static 'Admin/assets/img/avatars/1.png' %}" alt="Admin" class="img-fluid rounded-circle" style="max-width: 120px;">
					</div>
					<div class="col-md-9">
						<ul class="list-group list-group-flush">
							<li class="list-group-item"><strong>Username:</strong> {{ admin_login.username }}</li>
							<li class="list-group-item"><strong>Role:</strong> {{ admin_login.role }}</li>
							<li class="list-group-item"><strong>Status:</strong> {{ admin_login.status }}</li>
							<li class="list-group-item"><strong>Login ID:</strong> {{ admin_login.loginid }}</li>
						</ul>
					</div>
				</div>
			</div>
		</div>
	</div>
</div>

{% include 'Admin/adminfooter.html' %}
