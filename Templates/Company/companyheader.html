{% load static %}
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MaterailM Free Bootstrap Admin Template by WrapPixel</title>
  <link rel="shortcut icon" type="image/png" href="{% static 'Company/assets/images/logos/favicon.png' %}" />
  <link rel="stylesheet" href="{% static 'Company/assets/css/styles.min.css' %}" />
  
  <!-- Custom Sidebar Scroll Fix -->
  <style>
    .left-sidebar {
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }
    
    .sidebar-nav {
      height: calc(100vh - 120px);
      overflow-y: auto;
      overflow-x: hidden;
    }
    
    .sidebar-nav ul {
      padding-bottom: 20px;
    }
  </style>
</head>

<body>
  <!--  Body Wrapper -->
  <div class="page-wrapper" id="main-wrapper" data-layout="vertical" data-navbarbg="skin6" data-sidebartype="full"
    data-sidebar-position="fixed" data-header-position="fixed">

    <!--  App Topstrip -->
    <div class="app-topstrip bg-dark py-3 px-4 w-100">
      <h1 class="text-white m-0">Cleano</h1>
    </div>
    <!-- Sidebar Start -->
    <aside class="left-sidebar">
      <!-- Sidebar scroll-->
      <div>
        <div class="brand-logo d-flex align-items-center justify-content-between">
          <span class="text-nowrap logo-img text-blue fw-bold fs-5">Cleano</span>
          <div class="close-btn d-xl-none d-block sidebartoggler cursor-pointer" id="sidebarCollapse">
            <i class="ti ti-x fs-8"></i>
          </div>
        </div>
        <!-- Sidebar navigation-->
        <nav class="sidebar-nav scroll-sidebar" data-simplebar="">
          <ul id="sidebarnav">
            <li class="nav-small-cap">
              <iconify-icon icon="solar:menu-dots-linear" class="nav-small-cap-icon fs-4"></iconify-icon>
              <span class="hide-menu">Company Pages</span>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="/companyapp/companyhome/" aria-expanded="false">
                <iconify-icon icon="solar:home-angle-line-duotone"></iconify-icon>
                <span class="hide-menu">Company Home</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="/companyapp/service/" aria-expanded="false">
                <iconify-icon icon="solar:widget-add-line-duotone"></iconify-icon>
                <span class="hide-menu">Service</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="/companyapp/viewservices/" aria-expanded="false">
                <iconify-icon icon="solar:list-check-line-duotone"></iconify-icon>
                <span class="hide-menu">View Services</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="/companyapp/viewbookingrequests/" aria-expanded="false">
                <iconify-icon icon="solar:clipboard-check-line-duotone"></iconify-icon>
                <span class="hide-menu">Booking Requests</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="/companyapp/reportcategorycount/" aria-expanded="false">
                <iconify-icon icon="solar:clipboard-check-line-duotone"></iconify-icon>
                <span class="hide-menu">category wise<br>Purchase Report</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="/companyapp/companyprofile/" aria-expanded="false">
                <iconify-icon icon="solar:clipboard-check-line-duotone"></iconify-icon>
                <span class="hide-menu">Company Profile</span>
              </a>
            </li>
            <li class="sidebar-item">
              <a class="sidebar-link" href="/companyapp/reportservicecount/" aria-expanded="false">
                <iconify-icon icon="solar:clipboard-check-line-duotone"></iconify-icon>
                <span class="hide-menu">Service-wise<br>Purchase Report</span>
              </a>
            </li>
            
            <!-- ---------------------------------- -->
            <!-- Dashboard -->
            <!-- ---------------------------------- -->
            
          </nav>
        <!-- End Sidebar navigation -->
      </div>
      <!-- End Sidebar scroll-->
    </aside>
    <!--  Sidebar End -->
